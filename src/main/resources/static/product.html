<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .success {
            color: green;
            margin-top: 10px;
        }

        .error {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Create Category</h2>

        <input type="text" id="name" placeholder="Category Name" />
        <input type="text" id="type" placeholder="Type" />
        <textarea id="description" placeholder="Description"></textarea>

        <button onclick="submitCategory()">Submit</button>

        <div id="message"></div>
    </div>

    <script>
        async function submitCategory() {

            const name = document.getElementById("name").value;
            const type = document.getElementById("type").value;
            const description = document.getElementById("description").value;

            const data = {
                name: name,
                type: type,
                description: description
            };

            try {
                const response = await fetch("http://localhost:8080/products/create", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    document.getElementById("message").innerHTML =
                        "<p class='success'>Category Created Successfully!</p>";
                } else {
                    document.getElementById("message").innerHTML =
                        "<p class='error'>Error Creating Category</p>";
                }

            } catch (error) {
                document.getElementById("message").innerHTML =
                    "<p class='error'>Server Not Running</p>";
            }
        }
    </script>

</body>

</html>
